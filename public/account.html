<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — Bodhisatvvam</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1c3a28;
    --sage: #a8c5aa;
    --cream: #f5efe3;
    --cream-dark: #e8e0cc;
    --gold: #d4aa60;
    --amber: #c5832b;
    --clay: #a65d49;
    --text-main: #333333;
  }
  
  body {
    margin: 0; padding: 0;
    font-family: 'Montserrat', sans-serif;
    background-color: var(--cream);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  
  nav {
    background: rgba(245, 239, 227, 0.95);
    backdrop-filter: blur(10px);
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(28, 58, 40, 0.1);
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    color: var(--forest);
    text-decoration: none;
    font-weight: 600;
  }
  .nav-links a {
    text-decoration: none;
    color: var(--forest);
    font-size: 0.9rem;
    font-weight: 500;
  }
  
  .container {
    max-width: 800px;
    margin: 60px auto;
    padding: 0 20px;
    flex: 1;
    width: 100%;
    box-sizing: border-box;
  }
  
  h1 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--forest);
    font-size: 2.5rem;
    text-align: center;
    margin-bottom: 40px;
  }
  
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }
  
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.85rem;
    color: var(--forest);
    font-weight: 500;
  }
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--cream-dark);
    border-radius: 6px;
    font-family: 'Montserrat', sans-serif;
    box-sizing: border-box;
    transition: border-color 0.2s;
  }
  .form-group input:focus {
    outline: none;
    border-color: var(--gold);
  }
  
  .btn-primary {
    background: var(--forest);
    color: var(--cream);
    border: none;
    padding: 14px 24px;
    border-radius: 6px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    width: 100%;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.3s;
  }
  .btn-primary:hover {
    background: var(--amber);
  }
  .btn-outline {
    background: transparent;
    color: var(--forest);
    border: 1px solid var(--forest);
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-outline:hover {
    background: var(--forest);
    color: var(--cream);
  }
  
  .switch-link {
    text-align: center;
    margin-top: 20px;
    font-size: 0.9rem;
    color: #666;
  }
  .switch-link a {
    color: var(--amber);
    text-decoration: none;
    font-weight: 600;
  }
  
  /* Order History UI */
  .dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
  }
  .dashboard-header h2 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--forest);
    margin: 0;
    font-size: 2rem;
  }
  
  .history-section {
    margin-bottom: 40px;
  }
  .history-section h3 {
    color: var(--amber);
    font-size: 1.2rem;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--cream-dark);
    padding-bottom: 10px;
  }
  
  .order-card {
    border: 1px solid var(--cream-dark);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
    background: #faf9f5;
  }
  .order-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    font-size: 0.9rem;
    color: #666;
  }
  .order-header strong {
    color: var(--forest);
  }
  .order-status {
    background: var(--sage);
    color: var(--forest);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .order-items {
    font-size: 0.9rem;
  }
  .order-items ul {
    list-style-type: none;
    padding: 0;
    margin: 10px 0;
  }
  .order-items li {
    padding: 5px 0;
    border-bottom: 1px dashed var(--cream-dark);
    display: flex;
    justify-content: space-between;
  }
  .order-total {
    text-align: right;
    font-weight: 600;
    color: var(--forest);
    margin-top: 15px;
  }
  
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #888;
    background: #faf9f5;
    border-radius: 8px;
    border: 1px dashed var(--cream-dark);
  }
  
  #errorMsg, #registerErrorMsg {
    color: var(--clay);
    text-align: center;
    margin-bottom: 15px;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<nav>
  <a href="/index.html" class="nav-logo">Bodhisatvvam</a>
  <div class="nav-links">
    <a href="/index.html">← Back to Store</a>
  </div>
</nav>

<div class="container">
  
  <!-- LOGIN VIEW -->
  <div id="loginView" style="display: none; max-width: 400px; margin: 0 auto;">
    <h1>Welcome Back</h1>
    <div class="card">
      <div id="errorMsg"></div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="loginPhone" placeholder="Enter phone number" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
      </form>
      <div class="switch-link">
        Don't have an account? <a href="#" onclick="showView('registerView')">Sign up</a>
      </div>
    </div>
  </div>
  
  <!-- REGISTER VIEW -->
  <div id="registerView" style="display: none; max-width: 400px; margin: 0 auto;">
    <h1>Create Account</h1>
    <div class="card">
      <div id="registerErrorMsg"></div>
      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="regPhone" placeholder="10-digit number" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn-primary" id="regBtn">Create Account</button>
      </form>
      <div class="switch-link">
        Already have an account? <a href="#" onclick="showView('loginView')">Sign in</a>
      </div>
    </div>
  </div>
  
  <!-- DASHBOARD VIEW -->
  <div id="dashboardView" style="display: none;">
    <div class="dashboard-header">
      <h2>My Account</h2>
      <button class="btn-outline" onclick="handleLogout()">Sign Out</button>
    </div>
    
    <div class="card">
      <h3 style="margin-top:0; color:var(--forest);">Welcome, <span id="customerName"></span>!</h3>
      <p style="color:#666; margin-bottom: 30px;">View your past orders and booked healing sessions below.</p>
      
      <div class="history-section">
        <h3>🛍️ Product Orders</h3>
        <div id="ordersList">
          <div class="empty-state">Loading your orders...</div>
        </div>
      </div>
      
      <div class="history-section">
        <h3>✨ Healing Sessions</h3>
        <div id="bookingsList">
          <div class="empty-state">Loading your sessions...</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  // ── ROUTING & STATE ──
  function getToken() { return localStorage.getItem('bodhi_customer_token'); }
  function getName() { return localStorage.getItem('bodhi_customer_name'); }
  
  function checkAuth() {
    const token = getToken();
    if (token) {
      showView('dashboardView');
      document.getElementById('customerName').innerText = getName() || 'Guest';
      fetchHistory();
    } else {
      showView('loginView');
    }
  }

  function showView(viewId) {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('registerView').style.display = 'none';
    document.getElementById('dashboardView').style.display = 'none';
    document.getElementById(viewId).style.display = 'block';
  }

  // ── AUTHENTICATION ──
  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    const phone = document.getElementById('loginPhone').value;
    const password = document.getElementById('loginPassword').value;
    
    btn.disabled = true; btn.innerText = 'Signing in...'; err.innerText = '';
    
    try {
      const res = await fetch('/api/customer/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('bodhi_customer_token', data.token);
        localStorage.setItem('bodhi_customer_name', data.name);
        checkAuth();
      } else {
        err.innerText = data.message;
      }
    } catch (e) {
      err.innerText = 'Network error. Please try again.';
    } finally {
      btn.disabled = false; btn.innerText = 'Sign In';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('regBtn');
    const err = document.getElementById('registerErrorMsg');
    const name = document.getElementById('regName').value;
    const phone = document.getElementById('regPhone').value;
    const password = document.getElementById('regPassword').value;
    
    btn.disabled = true; btn.innerText = 'Creating...'; err.innerText = '';
    
    try {
      const res = await fetch('/api/customer/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('bodhi_customer_token', data.token);
        localStorage.setItem('bodhi_customer_name', name);
        checkAuth();
      } else {
        err.innerText = data.message;
      }
    } catch (e) {
      err.innerText = 'Network error. Please try again.';
    } finally {
      btn.disabled = false; btn.innerText = 'Create Account';
    }
  }

  function handleLogout() {
    localStorage.removeItem('bodhi_customer_token');
    localStorage.removeItem('bodhi_customer_name');
    checkAuth();
  }

  // ── FETCH DATA ──
  async function fetchHistory() {
    try {
      const res = await fetch('/api/orders/history', {
        headers: { 'Authorization': `Bearer ${getToken()}` }
      });
      const data = await res.json();
      
      if (!data.success) {
        if (res.status === 401) handleLogout(); // Token expired
        return;
      }
      
      renderOrders(data.orders || []);
      renderBookings(data.bookings || []);
      
    } catch (e) {
      document.getElementById('ordersList').innerHTML = '<div class="empty-state">Failed to load history.</div>';
    }
  }

  function renderOrders(orders) {
    const list = document.getElementById('ordersList');
    if (orders.length === 0) {
      list.innerHTML = '<div class="empty-state">You have no past orders yet.</div>';
      return;
    }
    
    let html = '';
    orders.forEach(o => {
      const date = new Date(o.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      let itemsHtml = '';
      try {
        const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
        itemsHtml = items.map(i => `<li><span>${i.qty}x ${i.name || i.id}</span> <span>₹${i.price * i.qty}</span></li>`).join('');
      } catch(e) {}
      
      html += `
        <div class="order-card">
          <div class="order-header">
            <div><strong>Order:</strong> #${o.order_id}</div>
            <div>${date}</div>
          </div>
          <div class="order-items">
            <ul>${itemsHtml}</ul>
          </div>
          <div class="order-total">
            Total: ₹${o.total} <span class="order-status" style="margin-left:10px;">${o.status}</span>
          </div>
        </div>
      `;
    });
    list.innerHTML = html;
  }

  function renderBookings(bookings) {
    const list = document.getElementById('bookingsList');
    if (bookings.length === 0) {
      list.innerHTML = '<div class="empty-state">You have no past sessions.</div>';
      return;
    }
    
    let html = '';
    bookings.forEach(b => {
      const bDate = new Date(b.date).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      html += `
        <div class="order-card">
          <div class="order-header">
            <div><strong>Session:</strong> ${b.session_name}</div>
            <div>Booked on: ${new Date(b.created_at).toLocaleDateString('en-IN')}</div>
          </div>
          <div class="order-items">
            <ul>
              <li><span>Schedule:</span> <span>${bDate} at ${b.time_slot}</span></li>
            </ul>
          </div>
          <div class="order-total">
            Paid: ₹${b.price} <span class="order-status" style="margin-left:10px;">Confirmed</span>
          </div>
        </div>
      `;
    });
    list.innerHTML = html;
  }

  // Initialize
  checkAuth();
</script>

</body>
</html>
